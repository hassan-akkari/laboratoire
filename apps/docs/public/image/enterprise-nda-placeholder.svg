<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Sibylla Network percorso frontend">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />
  <rect x="110" y="90" width="1060" height="540" rx="28" fill="#ffffff" stroke="#bfdbfe" stroke-width="2" />

  <rect x="150" y="130" width="560" height="44" rx="12" fill="url(#panel)" />
  <text x="170" y="160" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">Sibylla Network - Il mio percorso frontend</text>

  <rect x="150" y="210" width="980" height="80" rx="14" fill="#eff6ff" />
  <text x="175" y="250" font-family="Arial, sans-serif" font-size="28" fill="#1e3a8a">Dalle basi Platform alla delivery su Network</text>

  <rect x="150" y="320" width="300" height="250" rx="16" fill="#f8fafc" stroke="#cbd5e1" />
  <rect x="490" y="320" width="300" height="250" rx="16" fill="#f8fafc" stroke="#cbd5e1" />
  <rect x="830" y="320" width="300" height="250" rx="16" fill="#f8fafc" stroke="#cbd5e1" />

  <text x="175" y="365" font-family="Arial, sans-serif" font-size="22" fill="#1e293b">Architecture</text>
  <text x="515" y="365" font-family="Arial, sans-serif" font-size="22" fill="#1e293b">UI Standards</text>
  <text x="855" y="365" font-family="Arial, sans-serif" font-size="22" fill="#1e293b">Delivery Flow</text>

  <text x="175" y="410" font-family="Arial, sans-serif" font-size="18" fill="#334155">Panoramica del lavoro</text>
  <text x="175" y="445" font-family="Arial, sans-serif" font-size="18" fill="#334155">Standard UI, pattern riusabili,</text>
  <text x="175" y="480" font-family="Arial, sans-serif" font-size="18" fill="#334155">flussi core e impatto tecnico.</text>

  <text x="515" y="410" font-family="Arial, sans-serif" font-size="18" fill="#334155">Reusable components,</text>
  <text x="515" y="445" font-family="Arial, sans-serif" font-size="18" fill="#334155">governance, and layout</text>
  <text x="515" y="480" font-family="Arial, sans-serif" font-size="18" fill="#334155">consistency.</text>

  <text x="855" y="410" font-family="Arial, sans-serif" font-size="18" fill="#334155">Faster onboarding and</text>
  <text x="855" y="445" font-family="Arial, sans-serif" font-size="18" fill="#334155">predictable release</text>
  <text x="855" y="480" font-family="Arial, sans-serif" font-size="18" fill="#334155">quality.</text>

  <text x="150" y="675" font-family="Arial, sans-serif" font-size="20" fill="#334155">Percorso tecnico: struttura, riuso e delivery prevedibile.</text>
</svg>
